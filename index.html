<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кинозал</title>
<style type="text/css">
html,body{margin:0;padding:0;height:100%;overflow-y:hidden;}
body{background-color:black; color:white;}
#wrapper{height:100%; display:flex; justify-content:space-between; align-items:center;}
@media all and (max-width:550px) {}
</style>
<script type="text/javascript">
function getQueryString() {
  var result = {}, queryString = location.search.substring(1),
      re = /([^&=]+)=([^&]*)/g, m;

  while (m = re.exec(queryString)) {
    result[decodeURIComponent(m[1])] = decodeURIComponent(m[2]);
  }

  return result;
}

document.addEventListener("DOMContentLoaded", function(){
	document.getElementById('player').width = window.innerWidth - 340;
	
	let PlayerInited = false;
	if (getQueryString()['gg'] != undefined) {
		document.getElementById('player').src = 'https://goodgame.ru/player?' + getQueryString()['gg'];
		PlayerInited = true;
	}
	if (getQueryString()['wsd'] != undefined) {
		document.getElementById('player').src = 'https://wasd.tv/embed/' + getQueryString()['wsd'] + '/';
		PlayerInited = true;
	}
	if (getQueryString()['tw'] != undefined)
		document.getElementById('chat').src = 'https://www.twitch.tv/embed/' + getQueryString()['tw'] + '/chat?parent=kinotw.github.io';
		
	if (PlayerInited == false) {
		document.getElementById('wrapper').innerHTML = '<div style="padding:25px; text-align:center;">Для отображения кинозала добавьте id плеера GoodGame.ru (узнать номер, можно нажав кнопку поделиться, после слова "/player?") или ник WASD.tv (изменив "gg" в ссылке, на "wsd"), а также ник twitch.tv в адресную строку.<br>Например: https://kinotw.github.io/?gg=1&tw=residentevil<br>или<br>https://kinotw.github.io/?wsd=1&tw=residentevil</div>';
	}
});
</script>
</head>
<body>
<div id="wrapper">
	<iframe id="player" frameborder="0" allowfullscreen width="1580" height="100%" src="https://goodgame.ru/player?1"></iframe>
	<iframe id="chat" frameborder="0" width="340" height="100%" src="https://www.twitch.tv/popout/residentevil/chat"></iframe>
</div>
</body>
</html>
